    <!-- Restore SPA path saved by public/404.html on GitHub Pages refresh. -->
    <script>
      (function () {
        var stored = sessionStorage.getItem('spa-redirect')
        if (!stored) return
        sessionStorage.removeItem('spa-redirect')

        // Strip legacy .html suffix on project pages and leading /index.html.
        stored = stored.replace(/\/project\/([^/?#]+)\.html(?=$|[/?#])/, '/project/$1')
        stored = stored.replace(/^\/index\.html(?=$|[/?#])/, '/')

        if (stored && stored !== window.location.pathname + window.location.search + window.location.hash) {
          history.replaceState(null, '', stored)
        }
      })()
    </script>
